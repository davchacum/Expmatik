services:
  postgres:
    image: postgres:15
    container_name: vending-postgres
    environment:
      POSTGRES_DB: vending
      POSTGRES_USER: vending
      POSTGRES_PASSWORD: vending
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: vending-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vending
      SPRING_DATASOURCE_USERNAME: vending
      SPRING_DATASOURCE_PASSWORD: vending
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  frontend:
    build: ./frontend
    container_name: vending-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
