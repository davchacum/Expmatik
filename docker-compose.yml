services:
  postgres:
    image: postgres:15
    container_name: expmatik-postgres
    environment:
      POSTGRES_DB: expmatik
      POSTGRES_USER: expmatik
      POSTGRES_PASSWORD: expmatik
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: expmatik-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/expmatik
      SPRING_DATASOURCE_USERNAME: expmatik
      SPRING_DATASOURCE_PASSWORD: expmatik
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  frontend:
    build: ./frontend
    container_name: expmatik-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
