services:
  postgres:
    image: postgres:15
    container_name: expmatik-postgres
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: expmatik-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  frontend:
    build: ./frontend
    container_name: expmatik-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
