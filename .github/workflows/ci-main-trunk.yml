name: CI Main and Trunk

on:
  push:
    branches:
      - main
      - trunk

jobs:
  backend-tests:
    name: Backend Tests (Unit + Integration)
    runs-on: ubuntu-latest

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/expmatik_ci
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: expmatik_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d expmatik_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Grant execute permission to Maven wrapper
        run: chmod +x mvnw

      - name: Run all backend tests
        run: ./mvnw -B -ntp "-Dsurefire.rerunFailingTestsCount=2" test jacoco:report

      - name: Validate JaCoCo report exists
        run: test -f target/site/jacoco/jacoco.xml

      - name: Download Codacy Coverage Reporter
        run: |
          wget -O codacy-coverage-reporter https://github.com/codacy/codacy-coverage-reporter/releases/latest/download/codacy-coverage-reporter-linux
          chmod +x codacy-coverage-reporter

      - name: Upload JaCoCo coverage to Codacy
        if: always()
        run: |
          ./codacy-coverage-reporter report -r backend/target/site/jacoco/jacoco.xml --project-token ${{ secrets.CODACY_PROJECT_TOKEN }}

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: jacoco-report-main-trunk
          path: backend/target/site/jacoco/**
          if-no-files-found: warn

  codacy-analysis:
    name: Codacy Analysis
    runs-on: ubuntu-latest
    needs: [backend-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Codacy Analysis
        uses: codacy/codacy-analysis-cli-action@v4
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}