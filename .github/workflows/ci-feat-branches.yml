name: CI Feat Branches

on:
  push:
    branches:
      - fix/**
      - refactor/**
      - feature/**

jobs:
  backend-unit-tests:
    name: Backend Unit Tests (feat)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Grant execute permission to Maven wrapper
        run: chmod +x mvnw

      - name: Run backend unit tests
        run: ./mvnw -B -ntp "-Dsurefire.rerunFailingTestsCount=2" "-Dtest=*Test,!*IntegrationTest" test